name: PR Stats

on:
  pull_request:
    branches:
      - main
    paths:
      - '**/*.asm'

permissions:
  pull-requests: write

jobs:
  benchmark:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install build dependencies
        run: sudo apt-get install -y nasm binutils wrk strace

      - name: Run syscalls
        run: |
          chmod +x .github/scripts/syscalls.sh
          .github/scripts/syscalls.sh > syscalls-results.txt

      - name: Run benchmarks
        run: |
          chmod +x .github/scripts/benchmark.sh
          .github/scripts/benchmark.sh 1

      - name: Format benchmark comment
        run: |
          echo '```' > comment.md
          cat syscalls-results.txt | tail -3 >> comment.md
          echo '```' >> comment.md

          WRK=$(awk '/^\[server\]/{skip=1} /^\[wrk\]/{skip=0} !skip' bm1.txt)
          echo '```' >> comment.md
          echo "$WRK" >> comment.md
          echo '```' >> comment.md

      - name: Find existing benchmark comment
        uses: peter-evans/find-comment@v3
        id: find-comment
        with:
          issue-number: ${{ github.event.pull_request.number }}
          comment-author: 'github-actions[bot]'
          body-includes: '```'

      - name: Comment benchmark on PR
        uses: peter-evans/create-or-update-comment@v4
        with:
          comment-id: ${{ steps.find-comment.outputs.comment-id }}
          issue-number: ${{ github.event.pull_request.number }}
          body-path: comment.md
          edit-mode: replace