name: Benchmark PR

on:
  pull_request:
    branches:
      - main
    paths:
      - '**/*.asm'

jobs:
  benchmark:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install build dependencies
        run: sudo apt-get install -y nasm binutils wrk

      - name: Run benchmarks
        run: |
          chmod +x .github/scripts/benchmark.sh
          .github/scripts/benchmark.sh

      - name: Comment benchmark on PR
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const bm1 = fs.readFileSync('bm1.txt', 'utf8');

            // strip the [server] block
            const wrk = bm1.split('[wrk]')[1]?.trim() ?? bm1;

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: [
                "```",
                wrk,
                "```",
              ].join("\n"),
            });