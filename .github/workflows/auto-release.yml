name: Auto Release

on:
  push:
    paths:
      - 'releases.txt'
    branches:
      - main

permissions:
  contents: write

jobs:
  check-and-release:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.parse.outputs.version }}
      new_release: ${{ steps.parse.outputs.new_release }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Parse releases.txt and check for new release
        id: parse
        run: |
          chmod +x .github/scripts/parse-release.sh
          .github/scripts/parse-release.sh

      - name: Install build dependencies
        if: steps.parse.outputs.new_release == 'true'
        run: sudo apt-get install -y nasm binutils patchelf wrk strace

      - name: Build bundles
        if: steps.parse.outputs.new_release == 'true'
        run: |
          chmod +x .github/scripts/build-bundle.sh
          .github/scripts/build-bundle.sh x64
          .github/scripts/build-bundle.sh aarch64

      - name: Check binary size
        if: steps.parse.outputs.new_release == 'true'
        run: |
          chmod +x .github/scripts/binary-size.sh
          .github/scripts/binary-size.sh > bin-size.txt

      - name: Run syscalls tests
        if: steps.parse.outputs.new_release == 'true'
        run: |
          chmod +x .github/scripts/syscalls.sh
          .github/scripts/syscalls.sh > syscalls-results.txt

      - name: Run benchmarks
        if: steps.parse.outputs.new_release == 'true'
        run: |
          chmod +x .github/scripts/benchmark.sh
          .github/scripts/benchmark.sh

      - name: Generate release notes
        if: steps.parse.outputs.new_release == 'true'
        id: notes
        run: |
          chmod +x .github/scripts/generate-release-notes.sh
          .github/scripts/generate-release-notes.sh "${{ steps.parse.outputs.version }}" "${{ steps.parse.outputs.previous_commit }}"

      - name: Create GitHub Release
        if: steps.parse.outputs.new_release == 'true'
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ steps.parse.outputs.version }}
          name: ${{ steps.parse.outputs.version }}
          body_path: release-notes.md
          draft: false
          prerelease: false
          files: |
            nasmserver-linux-x64.zip
            nasmserver-linux-aarch64.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  docker:
    runs-on: ubuntu-latest
    needs: check-and-release
    if: needs.check-and-release.outputs.new_release == 'true'

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/nasmserver:${{ needs.check-and-release.outputs.version }}
            ${{ secrets.DOCKERHUB_USERNAME }}/nasmserver:latest

      - name: Update Docker Hub description
        uses: peter-evans/dockerhub-description@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
          repository: ${{ secrets.DOCKERHUB_USERNAME }}/nasmserver